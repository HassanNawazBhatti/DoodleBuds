<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DoodleBuds | Login/Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="container">

        <div class="title">
            <h1>DoodleBuds</h1>
            <p class="tagline">Let's Doodlify Your Day!</p>
        </div>

        <div class="view">
            <div class="slider">

                <div class="auth">
                    <h2>Login</h2>
                    <form>
                        <div class="inputs">
                            <label for="login-email">
                                <input type="email" placeholder="abcde@gmail.com" id="login-email" required>
                            </label>
                        </div>

                        <div class="inputs">
                            <label for="login-password">
                                <input type="password" id="login-password" placeholder="password" required>
                            </label>
                        </div>

                        <div>
                            <button id="login-btn" type="button">Login</button>

                        </div>

                        <div>
                            <button type="button" class="google-btn"><img id="logo" src="google.png" alt="google logo"><p style="color: black; left: 40%; transform: translateX(-60%);">Continue with Google</p></button>
                        </div>
                        
                        <p class="goto">Don't have an account? <a id="link" href="#">Sign Up</a></p>
                    </form>
                </div>

                <div class="auth">
                    <h2>Sign Up</h2>
                    <form>

                        <div class="inputs">
                            <label for="username">
                                <input type="text" placeholder="Enter your username" id="username" required>
                            </label>
                        </div>

                        <div class="inputs">
                            <label for="signup-email">
                                <input type="email" placeholder="abcde@gmail.com" id="signup-email" required>
                            </label>
                        </div>

                        <div class="inputs">
                            <label for="signup-password">
                                <input type="password" id="signup-password" placeholder="password" required>
                            </label>
                        </div>

                        <div class="inputs">
                            <label for="signup-confirm-password">
                                <input type="password" id="signup-confirm-password" placeholder="confirm password" required>
                            </label>
                        </div>

                        <div>
                            <button id="signup-btn" type="button">Sign Up</button>

                        </div>

                        <div>
                            <button type="button" class="google-btn"><img id="logo" src="google.png" alt="google logo"><p style="color: black; left: 40%; transform: translateX(-60%);">Continue with Google</p></button>
                        </div>

                        <p class="goto">Already have an account? <a id="link2" href="#">Login</a></p>
                    </form>
                </div>

            </div>
        </div>

    </div>

    <script>
        const link = document.getElementById('link');
        const link2 = document.getElementById('link2');
        const slider = document.querySelector('.slider');
        const sup = document.getElementById('signup-btn');
        const lin = document.getElementById('login-btn')


        link.addEventListener('click', function(e) {
            e.preventDefault();
            slider.classList.add('sliding');
            slider.classList.add('slide');
            setTimeout(() => slider.classList.remove('sliding'), 300);
        });

        link2.addEventListener('click', function(e) {
            e.preventDefault();
            slider.classList.add('sliding');
            slider.classList.remove('slide');
            setTimeout(() => slider.classList.remove('sliding'), 300);
        });

        sup.addEventListener('click', ()=> {
            const username = document.getElementById('username').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const cpassword = document.getElementById('signup-confirm-password').value;

            if(password!=cpassword){
                alert("password not matched!")
                return;
            }



            fetch('/register', {
                method: 'POST',
                headers: {
                    'Content-Type' : 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    email: email,
                    password: password
                })
                
            })
            .then(res => res.text())
            .then(data => {
                alert(data);
            })
        });

        lin.addEventListener('click', ()=> {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type' : 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            })
            .then(res => res.text())
            .then(data => {
                if (data.endsWith(".html")){
                    window.location.href = data;
                }
                else 
                    alert(data)
            })
        });



    </script>
</body>
</html>
