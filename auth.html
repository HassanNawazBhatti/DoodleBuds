<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DoodleBuds | Login/Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="container">

        <div class="title">
            <h1>DoodleBuds</h1>
            <p class="tagline">Let's Doodlify Your Day!</p>
        </div>

        <div class="view">
            <div class="slider">

                <div class="auth">
                    <h2>Login</h2>
                    <form>
                        <div class="inputs">
                            <label for="login-email">
                                <input type="email" placeholder="abcde@gmail.com" id="login-email" required>
                            </label>
                            <span class="error" id="login-email-error"></span>
                        </div>

                        <div class="inputs">
                            <label for="login-password">
                                <input type="password" id="login-password" placeholder="password" required>
                            </label>
                            <span class="error" id="login-password-error"></span>
                        </div>

                        <p class="error" id="login-message"></p>

                        <div>
                            <button id="login-btn" type="button">Login</button>

                        </div>

                        <div>
                            <button type="button" class="google-btn"><img id="logo" src="google.png" alt="google logo"><p style="color: black; left: 40%; transform: translateX(-60%);">Continue with Google</p></button>
                        </div>
                        
                        <p class="goto">Don't have an account? <a id="link" href="#">Sign Up</a></p>
                    </form>
                </div>

                <div class="auth">
                    <h2>Sign Up</h2>
                    <form>

                        <div class="inputs">
                            <label for="username">
                                <input type="text" placeholder="Enter your username" id="username" required>
                            </label>
                            <span class="error" id="username-error"></span>
                        </div>

                        <div class="inputs">
                            <label for="signup-email">
                                <input type="email" placeholder="abcde@gmail.com" id="signup-email" required>
                            </label>
                            <span class="error" id="signup-email-error"></span>
                        </div>

                        <div class="inputs">
                            <label for="signup-password">
                                <input type="password" id="signup-password" placeholder="password" required>
                            </label>
                            <span class="error" id="signup-password-error"></span>
                        </div>

                        <div class="inputs">
                            <label for="signup-confirm-password">
                                <input type="password" id="signup-confirm-password" placeholder="confirm password" required>
                            </label>
                            <span class="error" id="signup-confirm-password-error"></span>
                        </div>

                        <p class="error" id="signup-message"></p>

                        <div>
                            <button id="signup-btn" type="button">Sign Up</button>

                        </div>

                        <div>
                            <button type="button" class="google-btn"><img id="logo" src="google.png" alt="google logo"><p style="color: black; left: 40%; transform: translateX(-60%);">Continue with Google</p></button>
                        </div>

                        <p class="goto">Already have an account? <a id="link2" href="#">Login</a></p>
                    </form>
                    
                </div>
                
            </div>

        </div>
        
    </div>
    <div class="footer">
                    <p class="footer-text">Developed by Hassan Nawaz. ©2026 DoodleBuds. All rights reserved. </p>
                </div>

    <div class="modal" id="verify-modal">
        <div class="modal-content">
            <h2>Verify Email</h2>
            <p>Enter the 6-digit code we emailed you</p>
            <div class="inputs">
                <label for="verify-code">
                    <input type="text" id="verify-code" placeholder="6-digit code" maxlength="6">
                </label>
                <span class="error" id="verify-error"></span>
            </div>
            <div>
                <button id="verify-btn" type="button">Verify</button>
            </div>
            <div>
                <button id="resend-btn" type="button" class="google-btn"><p style="color: black;">Resend Code</p></button>
            </div>
        </div>
        
    </div>


    <script>
        const link = document.getElementById('link');
        const link2 = document.getElementById('link2');
        const slider = document.querySelector('.slider');
        const sup = document.getElementById('signup-btn');
        const lin = document.getElementById('login-btn')

        const modal = document.getElementById('verify-modal');
        const verifyBtn = document.getElementById('verify-btn');
        const resendBtn = document.getElementById('resend-btn');
        let pendingVerifyEmail = "";

        link.addEventListener('click', function(e) {
            e.preventDefault();
            slider.classList.add('sliding');
            slider.classList.add('slide');
            setTimeout(() => slider.classList.remove('sliding'), 300);
        });

        link2.addEventListener('click', function(e) {
            e.preventDefault();
            slider.classList.add('sliding');
            slider.classList.remove('slide');
            setTimeout(() => slider.classList.remove('sliding'), 300);
        });

        function clearErrors(ids) {
            ids.forEach(id => document.getElementById(id).textContent = "");
        }

        sup.addEventListener('click', ()=> {
            clearErrors(['username-error', 'signup-email-error', 'signup-password-error', 'signup-confirm-password-error', 'signup-message']);

            const username = document.getElementById('username').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const cpassword = document.getElementById('signup-confirm-password').value;

            if(password!=cpassword){
                document.getElementById('signup-confirm-password-error').textContent = "Passwords don't match!";
                return;
            }

            sup.disabled = true;
            sup.textContent = "Signing Up...";

            fetch('/register', {
                method: 'POST',
                headers: {
                    'Content-Type' : 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    email: email,
                    password: password
                })
                
            })
            .then(res => res.json())
            .then(data => {
                sup.disabled = false;
                sup.textContent = "Sign Up";

                if (!data.success) {
                    document.getElementById('signup-message').textContent = data.message;
                    return;
                }

                pendingVerifyEmail = email;
                document.getElementById('verify-error').textContent = "";
                modal.classList.add('show');
            })
            .catch(() => {
                sup.disabled = false;
                sup.textContent = "Sign Up";
                document.getElementById('signup-message').textContent = "Something went wrong!";
            })
        });

        lin.addEventListener('click', ()=> {
            clearErrors(['login-email-error', 'login-password-error', 'login-message']);

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            lin.disabled = true;
            lin.textContent = "Logging In...";

            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type' : 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            })
            .then(res => res.json())
            .then(data => {
                lin.disabled = false;
                lin.textContent = "Login";

                if (data.success) {
                    window.location.href = data.redirect;
                }
                else {
                    document.getElementById('login-message').textContent = data.message;
                }
            })
            .catch(() => {
                lin.disabled = false;
                lin.textContent = "Login";
                document.getElementById('login-message').textContent = "Something went wrong!";
            })
        });

        verifyBtn.addEventListener('click', ()=> {
            document.getElementById('verify-error').textContent = "";
            const code = document.getElementById('verify-code').value;

            verifyBtn.disabled = true;
            verifyBtn.textContent = "Verifying...";

            fetch('/verify', {
                method: 'POST',
                headers: {
                    'Content-Type' : 'application/json'
                },
                body: JSON.stringify({
                    email: pendingVerifyEmail,
                    code: code
                })
            })
            .then(res => res.json())
            .then(data => {
                verifyBtn.disabled = false;
                verifyBtn.textContent = "Verify";

                if (!data.success) {
                    document.getElementById('verify-error').textContent = data.message;
                    return;
                }

                // verified! log straight into main-menu, no login step needed
                window.location.href = data.redirect;
            })
            .catch(() => {
                verifyBtn.disabled = false;
                verifyBtn.textContent = "Verify";
                document.getElementById('verify-error').textContent = "Something went wrong!";
            })
        });

        resendBtn.addEventListener('click', ()=> {
            document.getElementById('verify-error').textContent = "";
            resendBtn.disabled = true;
            resendBtn.textContent = "Resending...";

            fetch('/resend-code', {
                method: 'POST',
                headers: {
                    'Content-Type' : 'application/json'
                },
                body: JSON.stringify({
                    email: pendingVerifyEmail
                })
            })
            .then(res => res.json())
            .then(data => {
                resendBtn.disabled = false;
                resendBtn.textContent = "Resend Code";
                document.getElementById('verify-error').textContent = data.message;
            })
            .catch(() => {
                resendBtn.disabled = false;
                resendBtn.textContent = "Resend Code";
                document.getElementById('verify-error').textContent = "Something went wrong!";
            })
        });

    </script>
</body>
</html>
