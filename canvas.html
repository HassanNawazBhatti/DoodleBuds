<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoodleBuds | Canvas</title>
    <link rel="stylesheet" href="canvas.css">
</head>
<body>
    <h1>---DRAW---</h1>
    <h1 class="roomCode"></h1>
    <h1 class="roomCreator"></h1>
    <canvas class="canvas">
    </canvas>

    <div class="tool-control">
        <button class="toolbtn">Tool: <span class="current-tool">Pen</span></button>
        <div class="tool-popup">
            <button class="popup-item" data-tool="pen">Pen</button>
            <button class="popup-item" data-tool="neon">Neon</button>
            <button class="popup-item" data-tool="eraser">Eraser</button>
        </div>
    </div>

    <div class="shape-control">
        <button class="shapebtn">Shape: <span class="current-shape">Freehand</span></button>
        <div class="shape-popup">
            <button class="popup-item" data-shape="freehand">Freehand</button>
            <button class="popup-item" data-shape="line">Line</button>
            <button class="popup-item" data-shape="rectangle">Rectangle</button>
            <button class="popup-item" data-shape="circle">Circle</button>
        </div>
    </div>

    <button class="clrbtn">CLEAR</button>
    <button class="undobtn">UNDO</button>
    <button class="redobtn">REDO</button>
    <label for="color-picker" class="colrlbl">Choose A Color =></label>
    <input type="color" class="colrbtn" name="color-picker" value="#000000">
    <label for="sizer" class="sldlbl">Size</label>
    <input type="range" name="sizer" class="sizer" min="1" max="10" step="1">
    <div class="footer">
            <p class="footer-text">Developed by Hassan Nawaz. ©2026 DoodleBuds. All rights reserved. </p>
    </div>


         <!--  .................Java-Script...................  -->

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let user;
        let room;
        fetch('/session-user', {
            method: 'GET',
            headers: {
                'Content-Type' : 'application/json'
            }
        }).then(res=>res.json())
        .then(data=>{
            user = data.user;
        })

        fetch('/session-room')
        .then(res => res.json())
        .then(data => {
            if (!data.success) return;
            
            socket = io();
            socket.on("connect", () => {

                console.log("Connected to server with socket ID:", socket.id);

                socket.emit("join-room", {
                    roomCode: data.room.code,
                    userId: user.id
                });

                socket.on("remote-stroke", (stroke) => {

                    ensureUser(stroke.owner);

                    delete activeStrokes[stroke.owner];

                    removeCursorLabel(stroke.owner);

                    if (stroke.points && stroke.points.length > 0) {
                        userStrokes[stroke.owner].push(stroke);
                        userHistory[stroke.owner] = [];
                    }

                    redraw();

                });

                socket.on("remote-live-stroke", (data) => {

                    activeStrokes[data.owner] = data;
                    redraw();

                    if (data.points && data.points.length > 0) {
                        const last = data.points[data.points.length - 1];
                        updateCursorLabel(data.owner, data.ownerName, last.x2, last.y2);
                    }

                });

                socket.on("remote-user-undo", ({ owner }) => {

                    ensureUser(owner);

                    if (userStrokes[owner].length === 0) return;

                    const last = userStrokes[owner].pop();

                    userHistory[owner].push(last);

                    redraw();

                });

                socket.on("remote-user-redo", ({ owner }) => {

                    ensureUser(owner);

                    if (userHistory[owner].length === 0) return;

                    const next = userHistory[owner].pop();

                    userStrokes[owner].push(next);

                    redraw();

                });

                socket.on("remote-clear-canvas", () => {
                    resetLocalState();
                });

            });

            document.querySelector('.roomCode').textContent =
                "Room Code: " + data.room.code;
    
            document.querySelector('.roomCreator').textContent =
                "Room Creator: " + data.room.creator.username;
            
            room = data.room;
        });
        

        const canvas = document.querySelector('.canvas');
        const ctx = canvas.getContext("2d");
        const sld = document.querySelector(".sizer");


        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;


        const ERASER_MULTIPLIER = 3.5;

        let isdrawing = false;
        let prex = 0;
        let prey = 0;
        let userStrokes = {};   
        let activeStrokes = {};
        let userHistory = [];   
        let stroke = null;
        let currentTool = "pen";
        let currentShape = "freehand";
        let startx,starty = 0;
        const dotsize = 0.001;
        let cursorLabels = {};

        const btn = document.querySelector('.clrbtn');
        btn.addEventListener('pointerdown', function() {
            btn.classList.add('btnclicked');
            clearCanvas();
        })
        btn.addEventListener('pointerup', function() {
            btn.classList.remove('btnclicked');
        })

        const btn2 = document.querySelector('.undobtn');
        btn2.addEventListener('pointerdown', function() {
            btn2.classList.add('btnclicked');
            undo();
        })
        btn2.addEventListener('pointerup', function() {
            btn2.classList.remove('btnclicked');
        })

        const btn3 = document.querySelector('.redobtn');
        btn3.addEventListener('pointerdown', function() {
            btn3.classList.add('btnclicked');
            redo();
        })
        btn3.addEventListener('pointerup', function() {
            btn3.classList.remove('btnclicked');
        })


        const toolbtn = document.querySelector('.toolbtn');
        const toolPopup = document.querySelector('.tool-popup');
        const shapebtn = document.querySelector('.shapebtn');
        const shapePopup = document.querySelector('.shape-popup');
        const currentToolLabel = document.querySelector('.current-tool');
        const currentShapeLabel = document.querySelector('.current-shape');

        toolbtn.addEventListener('pointerdown', function(e) {
            e.stopPropagation();
            shapePopup.classList.remove('open');
            toolPopup.classList.toggle('open');
        })

        shapebtn.addEventListener('pointerdown', function(e) {
            e.stopPropagation();
            toolPopup.classList.remove('open');
            shapePopup.classList.toggle('open');
        })

        toolPopup.querySelectorAll('.popup-item').forEach(function(item) {
            item.addEventListener('pointerdown', function(e) {
                e.stopPropagation();
                selectTool(item.dataset.tool);
                toolPopup.classList.remove('open');
            })
        })

        shapePopup.querySelectorAll('.popup-item').forEach(function(item) {
            item.addEventListener('pointerdown', function(e) {
                e.stopPropagation();
                selectShape(item.dataset.shape);
                shapePopup.classList.remove('open');
            })
        })

        document.addEventListener('pointerdown', function() {
            toolPopup.classList.remove('open');
            shapePopup.classList.remove('open');
        })

        function ensureUser(owner){

            if(!userStrokes[owner]){
                userStrokes[owner] = [];
            }
        
            if(!userHistory[owner]){
                userHistory[owner] = [];
            }
        
        }

        function selectTool(tool) {
            currentTool = tool;
            currentToolLabel.textContent = tool.charAt(0).toUpperCase() + tool.slice(1);
        }

        function selectShape(shape) {
            currentShape = shape;
            currentShapeLabel.textContent = shape.charAt(0).toUpperCase() + shape.slice(1);
        }

        function getEffectiveShape() {
            if (currentTool === "eraser") return "freehand";
            return currentShape;
        }

        function start(e) {
            startx = e.offsetX;
            starty = e.offsetY;
            if (isdrawing) return;

            const clr = document.querySelector(".colrbtn").value;
            const size = document.querySelector(".sizer").value;

            // Capture the pointer so we keep getting move/up events for THIS
            // pointer even if it slides outside the canvas. This is what
            // makes drawing smooth and continuous on touch devices.
            canvas.setPointerCapture(e.pointerId);

            const seq = Date.now();

            if (currentTool === "eraser") {
                stroke = {
                    owner: user.id,
                    ownerName: user.username,
                    tool: "eraser",
                    color: "white",
                    size: size,
                    points: [],
                    seq: seq
                };
            } 
            else if(currentTool === "neon"){
                stroke = {
                    owner: user.id,
                    ownerName: user.username,
                    tool: "neon",
                    color: clr,
                    size: size,
                    points: [],
                    seq: seq
                };
            } 
            else {
                stroke = {
                    owner: user.id,
                    ownerName: user.username,
                    tool: "pen",
                    color: clr,
                    size: size,
                    points: [],
                    seq: seq
                };
            }

            activeStrokes[user.id] = stroke;

            isdrawing = true;
            prex = e.offsetX;
            prey = e.offsetY;
            drawline(prex, prey, prex+dotsize, prey+dotsize);
        }

        function draw(e) {
            if (!isdrawing) return;
            e.preventDefault(); // belt-and-suspenders against scroll/pan on touch

            let currx = e.offsetX;
            let curry = e.offsetY;

            const shape = getEffectiveShape();

            if(shape === "rectangle"){
                drawrect(startx, starty, currx, curry);
                return;
            }
            else if(shape === "circle"){
                drawcircle(startx,starty,currx,curry);
                return;
            }
            else if(shape === "line"){
                drawshapedline(startx,starty,currx,curry);
                return;
            }
            else
            drawline(prex, prey, currx, curry);

            prex = currx;
            prey = curry;
        }

        function broadcastLiveStroke() {
            if (socket) {
                socket.emit("live-stroke", stroke);
            }
        }

        function drawline(x1, y1, x2, y2) {
            const segment = { x1, y1, x2, y2 };
            stroke.points.push(segment);

            applyStrokeStyle(stroke);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            broadcastLiveStroke();
        }

        function drawrect(x1,y1,x2,y2){
            stroke.points = [];// as eacg time mouse moves, previous preview is replaced by current(first preview is dot)
            redraw();
            applyStrokeStyle(stroke);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y1);
            ctx.lineTo(x2,y2);
            ctx.lineTo(x1,y2);
            ctx.lineTo(x1,y1);
            ctx.stroke();
            const seg1 = { x1:x1, y1:y1, x2:x2, y2:y1 };
            const seg2 = { x1:x2, y1:y1, x2:x2, y2:y2 };
            const seg3 = { x1:x2, y1:y2, x2:x1, y2:y2 };
            const seg4 = { x1:x1, y1:y2, x2:x1, y2:y1 };
            stroke.points.push(seg1,seg2,seg3,seg4);

            broadcastLiveStroke();
        }

        function drawcircle(x1,y1,x2,y2){

            stroke.points = [];
        
            redraw();
        
            applyStrokeStyle(stroke);
        
            // midpoint = centre
            const cx = (x1 + x2) / 2;
            const cy = (y1 + y2) / 2;
        
            // diameter = distance between mouse points
            const radius = Math.sqrt(
                (x2-x1)*(x2-x1) +
                (y2-y1)*(y2-y1)
            ) / 2;
        
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI*2);
            ctx.stroke();
            
            const pieces = 72;
            
            for(let i=0;i<pieces;i++){

                const a1 = (i/pieces) * Math.PI*2;
                const a2 = ((i+1)/pieces) * Math.PI*2;

                stroke.points.push({

                x1: cx + radius*Math.cos(a1),
                y1: cy + radius*Math.sin(a1),

                x2: cx + radius*Math.cos(a2),
                y2: cy + radius*Math.sin(a2)
                });
            }

            broadcastLiveStroke();
        }
        
        function drawshapedline(x1,y1,x2,y2){
            stroke.points = [];// as eacg time mouse moves, previous preview is replaced by current(first preview is dot)
            redraw();
            applyStrokeStyle(stroke);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            const seg = {x1,y1,x2,y2};
            stroke.points.push(seg);

            broadcastLiveStroke();
        }

        function applyStrokeStyle(s) {
            ctx.lineCap = "round";
            if (s.tool === "eraser") {
                ctx.globalCompositeOperation = "destination-out";
                ctx.strokeStyle = "rgba(0,0,0,1)";
                ctx.lineWidth = s.size * ERASER_MULTIPLIER;
                ctx.shadowColor = "transparent";
                ctx.shadowBlur = 0;
            } 
            else if(s.tool ==="neon"){
                ctx.globalCompositeOperation = "source-over";
                ctx.strokeStyle = 'white';
                ctx.lineWidth = s.size;
                ctx.shadowColor = s.color;
                ctx.shadowBlur = Math.max(12, s.size * 4);
            }
            else  {
                ctx.globalCompositeOperation = "source-over";
                ctx.strokeStyle = s.color;
                ctx.lineWidth = s.size;
                ctx.shadowBlur = 0;
                ctx.shadowColor = "transparent";
            }
        }

        function stopp(e) {

            if (!isdrawing) return;

            isdrawing = false;

            if (e && canvas.hasPointerCapture(e.pointerId)) {
                canvas.releasePointerCapture(e.pointerId);
            }

            saveStroke();
        }


        function saveStroke() {

        if (socket && stroke) {
            socket.emit("stroke-finished", stroke);
        }

        if (!stroke || stroke.points.length === 0) {
            delete activeStrokes[user.id];
            stroke = null;
            return;
        }

        ensureUser(stroke.owner);

        userStrokes[stroke.owner].push(stroke);

        userHistory[stroke.owner] = [];

        delete activeStrokes[stroke.owner];

        stroke = null;
        }

        function undo() {

        ensureUser(user.id);

        if (userStrokes[user.id].length === 0) return;

        const last = userStrokes[user.id].pop();

        userHistory[user.id].push(last);

        redraw();

        if (socket) {
            socket.emit("user-undo", { owner: user.id });
        }

        }

        function redo() {

            ensureUser(user.id);

            if (userHistory[user.id].length === 0) return;

            const next = userHistory[user.id].pop();

            userStrokes[user.id].push(next);

            redraw();

            if (socket) {
                socket.emit("user-redo", { owner: user.id });
            }

        }

        function redraw() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const allStrokes = [];

            for (const owner in userStrokes) {
                for (const s of userStrokes[owner]) {
                    allStrokes.push(s);
                }
            }

            for (const owner in activeStrokes) {
                allStrokes.push(activeStrokes[owner]);
            }

            allStrokes.sort(function(a, b) {
                return (a.seq || 0) - (b.seq || 0);
            });

            for (const s of allStrokes) {

                applyStrokeStyle(s);

                for (const p of s.points) {

                    ctx.beginPath();
                    ctx.moveTo(p.x1, p.y1);
                    ctx.lineTo(p.x2, p.y2);
                    ctx.stroke();

                }
            }

            ctx.globalCompositeOperation = "source-over";
        }

        function updateCursorLabel(owner, name, x, y) {

            let label = cursorLabels[owner];

            if (!label) {
                label = document.createElement('div');
                label.className = 'user-cursor-label';
                document.body.appendChild(label);
                cursorLabels[owner] = label;
            }

            label.textContent = name || 'Guest';

            const liveRect = canvas.getBoundingClientRect();
            const scaleX = liveRect.width / canvas.width;
            const scaleY = liveRect.height / canvas.height;

            label.style.left = (liveRect.left + x * scaleX) + "px";
            label.style.top = (liveRect.top + y * scaleY) + "px";
        }

        function removeCursorLabel(owner) {
            const label = cursorLabels[owner];
            if (label) {
                label.remove();
                delete cursorLabels[owner];
            }
        }

        function resetLocalState() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            userStrokes = {};
            userHistory = {};
            activeStrokes = {};
            for (const owner in cursorLabels) {
                removeCursorLabel(owner);
            }
            stroke = null;
            isdrawing = false;
        }

        function clearCanvas() {
            resetLocalState();
            if (socket) {
                socket.emit("clear-canvas");
            }
        }


        canvas.addEventListener("pointerdown", start);
        canvas.addEventListener("pointermove", draw);
        canvas.addEventListener("pointerup", stopp);
        canvas.addEventListener("pointercancel", stopp);

    </script>
</body>
</html>
