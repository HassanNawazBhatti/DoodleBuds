<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoodleBuds | Canvas</title>
    <link rel="stylesheet" href="canvas.css">
</head>
<body>
    <h1>---DRAW---</h1>
    <canvas class="canvas">
    </canvas>
    <button class="neonbtn">NEON</button>
    <button class="clrbtn">CLEAR</button>
    <button class="undobtn">UNDO</button>
    <button class="redobtn">REDO</button>
    <button class="erasebtn">ERASE</button>
    <label for="color-picker" class="colrlbl">Choose A Color =></label>
    <input type="color" class="colrbtn" name="color-picker" value="#000000">
    <label for="sizer" class="sldlbl">Size</label>
    <input type="range" name="sizer" class="sizer" min="1" max="10" step="1">
    <div class="footer">
            <p class="footer-text">Developed by Hassan Nawaz. ©2026 DoodleBuds. All rights reserved. </p>
    </div>


         <!--  .................Java-Script...................  -->
    <script>

        const canvas = document.querySelector('.canvas');
        const ctx = canvas.getContext("2d");
        const sld = document.querySelector(".sizer");


        canvas.width = window.innerWidth * 0.8;
        canvas.height = window.innerHeight * 0.8;


        const ERASER_MULTIPLIER = 1.5;

        let isdrawing = false;
        let prex = 0;
        let prey = 0;
        let strokes = [];   
        let history = [];   
        let stroke = null;  
        let erase = false;
        let neon = false;
        const dotsize = 0.0000000001;

        const btn = document.querySelector('.clrbtn');
        btn.addEventListener('pointerdown', function() {
            btn.classList.add('btnclicked');
            clearCanvas();
        })
        btn.addEventListener('pointerup', function() {
            btn.classList.remove('btnclicked');
        })

        const btn2 = document.querySelector('.undobtn');
        btn2.addEventListener('pointerdown', function() {
            btn2.classList.add('btnclicked');
            undo();
        })
        btn2.addEventListener('pointerup', function() {
            btn2.classList.remove('btnclicked');
        })

        const btn3 = document.querySelector('.redobtn');
        btn3.addEventListener('pointerdown', function() {
            btn3.classList.add('btnclicked');
            redo();
        })
        btn3.addEventListener('pointerup', function() {
            btn3.classList.remove('btnclicked');
        })

        const btn4 = document.querySelector('.erasebtn');
        btn4.addEventListener('pointerdown', function() {
            erasetoggle();
            btn4.classList.toggle('btnclicked', erase);
        })

        const btn5 = document.querySelector('.neonbtn', neon);
        btn5.addEventListener('pointerdown', function() {
            neontoggle();
            btn5.classList.toggle('btnclicked');
        })


        function start(e) {

            if (isdrawing) return;

            const clr = document.querySelector(".colrbtn").value;
            const size = document.querySelector(".sizer").value;

            // Capture the pointer so we keep getting move/up events for THIS
            // pointer even if it slides outside the canvas. This is what
            // makes drawing smooth and continuous on touch devices.
            canvas.setPointerCapture(e.pointerId);

            if (erase) {
                stroke = {
                    tool: "eraser",
                    color: "white",
                    size: size,
                    points: []
                };
            } 
            else if(neon){
                stroke = {
                    tool: "neon",
                    color: clr,
                    size: size,
                    points: []
                };
            } 
            else {
                stroke = {
                    tool: "pen",
                    color: clr,
                    size: size,
                    points: []
                };
            }

            isdrawing = true;
            prex = e.offsetX;
            prey = e.offsetY;
            drawline(prex, prey, prex+dotsize, prey+dotsize);
        }

        function draw(e) {
            if (!isdrawing) return;
            e.preventDefault(); // belt-and-suspenders against scroll/pan on touch

            let currx = e.offsetX;
            let curry = e.offsetY;

            drawline(prex, prey, currx, curry);

            prex = currx;
            prey = curry;
        }

        function drawline(x1, y1, x2, y2) {
            const segment = { x1, y1, x2, y2 };
            stroke.points.push(segment);

            applyStrokeStyle(stroke);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }


        function applyStrokeStyle(s) {
            ctx.lineCap = "round";
            if (s.tool === "eraser") {
                ctx.strokeStyle = "white";
                ctx.lineWidth = s.size * ERASER_MULTIPLIER;
                ctx.shadowColor = "transparent";
                ctx.shadowBlur = 0;
            } 
            else if(s.tool ==="neon"){
                ctx.strokeStyle = 'white';
                ctx.lineWidth = s.size;
                ctx.shadowColor = s.color;
                ctx.shadowBlur = Math.max(12, s.size * 4);
            }
            else  {
                ctx.strokeStyle = s.color;
                ctx.lineWidth = s.size;
                ctx.shadowBlur = 0;
                ctx.shadowColor = "transparent";
            }
        }

        function stopp(e) {

            if (!isdrawing) return;

            isdrawing = false;

            if (e && canvas.hasPointerCapture(e.pointerId)) {
                canvas.releasePointerCapture(e.pointerId);
            }

            saveStroke();
        }


        function saveStroke() {
            if (stroke && stroke.points.length > 0) {
                strokes.push(stroke);
                history = [];
            }
            stroke = null;
        }

        function undo() {
            if (strokes.length === 0) return;
            const last = strokes.pop();
            history.push(last);
            redraw(strokes);
        }

        function redo() {
            if (history.length === 0) return;
            const next = history.pop();
            strokes.push(next);
            redraw(strokes);
        }

        function redraw(strokesToDraw) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < strokesToDraw.length; i++) {
                const s = strokesToDraw[i];
                for (let j = 0; j < s.points.length; j++) {
                    const p = s.points[j];
                    applyStrokeStyle(s);
                    ctx.beginPath();
                    ctx.moveTo(p.x1, p.y1);
                    ctx.lineTo(p.x2, p.y2);
                    ctx.stroke();
                }
            }
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            strokes = [];
            history = [];
            stroke = null;
            isdrawing = false;
        }

        function erasetoggle() {
            erase = !erase;
        }

        function neontoggle() {
            neon = !neon;
        }


        canvas.addEventListener("pointerdown", start);
        canvas.addEventListener("pointermove", draw);
        canvas.addEventListener("pointerup", stopp);
        canvas.addEventListener("pointercancel", stopp);

    </script>
</body>
</html>
